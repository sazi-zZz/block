name: Secure Deploy to Hostever

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🔐 Inject Secrets into config/db.php
      run: |
        sed -i "s|DB_HOST_PLACEHOLDER|${{ secrets.DB_HOST }}|g" config/db.php
        sed -i "s|DB_NAME_PLACEHOLDER|${{ secrets.DB_NAME }}|g" config/db.php
        sed -i "s|DB_USER_PLACEHOLDER|${{ secrets.DB_USER }}|g" config/db.php
        sed -i "s|DB_PASS_PLACEHOLDER|${{ secrets.DB_PASS }}|g" config/db.php

    - name: 📧 Inject Mail Secrets into includes/mailer.php
      run: |
        sed -i "s|MAIL_USER_PLACEHOLDER|${{ secrets.MAIL_USER }}|g" includes/mailer.php
        sed -i "s|MAIL_PASS_PLACEHOLDER|${{ secrets.MAIL_PASS }}|g" includes/mailer.php

    - name: 🚀 FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./public_html/blocknet.online/